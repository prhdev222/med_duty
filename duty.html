<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🩺 ระบบถามเวร — Duty Roster Chat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0f1a;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-input: #0d1424;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.15);
    --accent-dim: #1e6a8e;
    --text-primary: #e8edf5;
    --text-secondary: #8494ad;
    --text-muted: #4a5568;
    --border: #1e2d45;
    --success: #34d399;
    --warning: #fbbf24;
    --user-bubble: #1e3a5f;
    --bot-bubble: #1a2236;
    --font-main: 'IBM Plex Sans Thai', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 100%;
    height: 100%;
  }

  body {
    width: 100%;
    min-width: 100%;
    min-height: 100vh;
    height: 100vh;
    font-family: var(--font-main);
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 16px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .header-text h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Chat Area — min-height: 0 ให้ flex อนุญาตให้เลื่อนได้ */
  .chat-area {
    width: 100%;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  /* ข้อความบอต (ตารางเวร) ให้กว้างขึ้น เพื่อเห็นชื่อ Consult ครบ */
  .message.bot {
    max-width: 96%;
    align-self: flex-start;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .bot .message-avatar {
    background: linear-gradient(135deg, var(--accent), #818cf8);
  }

  .user .message-avatar {
    background: var(--accent-dim);
  }

  .message-content {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .bot .message-content {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .user .message-content {
    background: var(--user-bubble);
    border: 1px solid rgba(56, 189, 248, 0.15);
    border-top-right-radius: 4px;
  }

  .message-content .duty-card {
    margin-top: 10px;
    padding: 12px;
    background: rgba(56, 189, 248, 0.06);
    border: 1px solid rgba(56, 189, 248, 0.12);
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
  }

  .duty-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .duty-row:last-child { border-bottom: none; }
  .duty-label { color: var(--text-secondary); flex-shrink: 0; }
  .duty-name {
    color: var(--accent);
    font-weight: 500;
    min-width: 0;
    word-break: break-word;
    text-align: right;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Quick Actions */
  .quick-actions {
    width: 100%;
    padding: 8px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .quick-btn {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-secondary);
    font-size: 12.5px;
    font-family: var(--font-main);
    cursor: pointer;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Input Area */
  .input-area {
    width: 100%;
    padding: 16px 24px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-wrapper input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-main);
    font-size: 14px;
  }

  .input-wrapper input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #818cf8);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.2s;
  }

  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .welcome h2 {
    font-size: 20px;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .welcome p { font-size: 13px; line-height: 1.6; }

  @media (max-width: 600px) {
    .message { max-width: 92%; }
    .message.bot { max-width: 98%; }
    .header { padding: 12px 16px; }
    .chat-area { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .quick-actions { padding: 8px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div class="header-text">
    <h1>ระบบถามเวร</h1>
    <p>ถามได้เลย เช่น "ใครเวรวันนี้"</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">🩺</div>
    <h2>สวัสดีค่ะ! ถามเรื่องเวรได้เลย</h2>
    <p>ระบบเชื่อมต่อกับ Google Sheet ตารางเวร<br>ถามเป็นภาษาธรรมชาติได้เลยค่ะ</p>
  </div>
</div>

<div class="quick-actions">
  <button class="quick-btn" onclick="askQuestion('ใครเวรวันนี้')">📅 ใครเวรวันนี้?</button>
  <button class="quick-btn" onclick="askQuestion('ใครเวรพรุ่งนี้')">🔜 ใครเวรพรุ่งนี้?</button>
  <button class="quick-btn" onclick="askQuestion('ตารางเวรสัปดาห์นี้')">🗓️ เวรสัปดาห์นี้</button>
  <button class="quick-btn" onclick="askQuestion('มีแลกเวรอะไรบ้าง')">🔄 มีแลกเวรอะไรบ้าง</button>
  <button class="quick-btn" onclick="askQuestion('เวรของหมอสุพจน์วันไหน')">👤 เวรของหมอสุพจน์</button>
  <button class="quick-btn" onclick="promptPersonDuty()">👤 เวรของใครคนหนึ่ง</button>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <input type="text" id="userInput" placeholder="ถามเรื่องเวรได้เลย..." 
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-note">เชื่อมต่อกับ Google Sheet + Hugging Face AI</div>
</div>

<script>
// =============================================
// CONFIG — URL มาจาก .env (server.js แทนที่ __APPS_SCRIPT_URL__ ตอนส่งหน้า)
// เปิดไฟล์ตรงๆ = โหมด demo | รัน npm start แล้วเปิด http://localhost:3780 = ใช้ URL จาก .env
// =============================================
const APPS_SCRIPT_URL = '__APPS_SCRIPT_URL__';

const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, sender, isHTML = false) {
  // Remove welcome message
  const welcome = chatArea.querySelector('.welcome');
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `message ${sender}`;
  msg.innerHTML = `
    <div class="message-avatar">${sender === 'bot' ? '🤖' : '👤'}</div>
    <div class="message-content">${isHTML ? text : escapeHTML(text)}</div>
  `;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="message-avatar">🤖</div>
    <div class="message-content">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function askQuestion(text) {
  userInput.value = text;
  sendMessage();
}

// กดปุ่ม "เวรของใครคนหนึ่ง" → ให้พิมพ์ชื่อในช่อง แล้วกดส่ง
function promptPersonDuty() {
  userInput.value = 'เวรของ ';
  userInput.placeholder = 'พิมพ์ชื่อแพทย์ต่อ เช่น หมอสุพจน์ หรือ หมอสุพจน์วันไหน';
  userInput.focus();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  userInput.value = '';
  userInput.placeholder = 'ถามเรื่องเวรได้เลย...';
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ question: text })
    });
    const data = await res.json();
    removeTyping();

    if (data.success) {
      addMessage(data.answer, 'bot', true);
    } else {
      addMessage('ขอโทษค่ะ เกิดข้อผิดพลาด: ' + (data.error || 'ไม่ทราบสาเหตุ'), 'bot');
    }
  } catch (err) {
    removeTyping();
    addMessage('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่ค่ะ', 'bot');
    console.error(err);
  }

  sendBtn.disabled = false;
  userInput.focus();
}

// =============================================
// DEMO MODE — ใช้เมื่อไม่มี URL จาก .env (เปิดไฟล์ตรงๆ หรือ server ไม่มี .env)
// =============================================
if (APPS_SCRIPT_URL === '__APPS_SCRIPT_URL__' || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
  const originalSend = sendMessage;
  sendMessage = async function() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    await new Promise(r => setTimeout(r, 1200));
    removeTyping();

    // Demo responses
    const demoSchedule = {
      'จันทร์': { เช้า: 'หมอก้อง', บ่าย: 'หมอแอน', ดึก: 'หมอนิด' },
      'อังคาร': { เช้า: 'หมอบี', บ่าย: 'หมอก้อง', ดึก: 'หมอแอน' },
      'พุธ': { เช้า: 'หมอนิด', บ่าย: 'หมอบี', ดึก: 'หมอก้อง' },
      'พฤหัสบดี': { เช้า: 'หมอแอน', บ่าย: 'หมอนิด', ดึก: 'หมอบี' },
      'ศุกร์': { เช้า: 'หมอก้อง', บ่าย: 'หมอแอน', ดึก: 'หมอนิด' },
      'เสาร์': { เช้า: 'หมอบี', บ่าย: 'หมอนิด', ดึก: 'หมอแอน' },
      'อาทิตย์': { เช้า: 'หมอแอน', บ่าย: 'หมอก้อง', ดึก: 'หมอบี' }
    };

    const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    const today = days[new Date().getDay()];
    const todayDuty = demoSchedule[today];

    let answer;

    if (text.includes('วันนี้') || text.includes('ใครเวร')) {
      answer = `📋 เวรวันนี้ (วัน${today}) ค่ะ
<div class="duty-card">
  <div class="duty-row"><span class="duty-label">🌅 เวรเช้า</span><span class="duty-name">${todayDuty.เช้า}</span></div>
  <div class="duty-row"><span class="duty-label">☀️ เวรบ่าย</span><span class="duty-name">${todayDuty.บ่าย}</span></div>
  <div class="duty-row"><span class="duty-label">🌙 เวรดึก</span><span class="duty-name">${todayDuty.ดึก}</span></div>
</div>`;
    } else if (text.includes('พรุ่งนี้')) {
      const tmr = days[(new Date().getDay() + 1) % 7];
      const tmrDuty = demoSchedule[tmr];
      answer = `📋 เวรพรุ่งนี้ (วัน${tmr}) ค่ะ
<div class="duty-card">
  <div class="duty-row"><span class="duty-label">🌅 เวรเช้า</span><span class="duty-name">${tmrDuty.เช้า}</span></div>
  <div class="duty-row"><span class="duty-label">☀️ เวรบ่าย</span><span class="duty-name">${tmrDuty.บ่าย}</span></div>
  <div class="duty-row"><span class="duty-label">🌙 เวรดึก</span><span class="duty-name">${tmrDuty.ดึก}</span></div>
</div>`;
    } else if (text.includes('สัปดาห์')) {
      let table = '📋 ตารางเวรสัปดาห์นี้\n<div class="duty-card">';
      for (const [day, duty] of Object.entries(demoSchedule)) {
        table += `<div class="duty-row"><span class="duty-label">${day}</span><span class="duty-name">${duty.เช้า} / ${duty.บ่าย} / ${duty.ดึก}</span></div>`;
      }
      table += '</div>';
      answer = table;
    } else if (text.includes('หมอก้อง')) {
      answer = `👨‍⚕️ ตารางเวรของ <b>หมอก้อง</b>
<div class="duty-card">
  <div class="duty-row"><span class="duty-label">จันทร์</span><span class="duty-name">เช้า</span></div>
  <div class="duty-row"><span class="duty-label">อังคาร</span><span class="duty-name">บ่าย</span></div>
  <div class="duty-row"><span class="duty-label">พุธ</span><span class="duty-name">ดึก</span></div>
  <div class="duty-row"><span class="duty-label">ศุกร์</span><span class="duty-name">เช้า</span></div>
  <div class="duty-row"><span class="duty-label">อาทิตย์</span><span class="duty-name">บ่าย</span></div>
</div>`;
    } else {
      answer = '🤔 ขอโทษค่ะ ไม่เข้าใจคำถาม ลองถามใหม่ เช่น "ใครเวรวันนี้" ค่ะ';
    }

    addMessage(answer, 'bot', true);
    sendBtn.disabled = false;
    userInput.focus();
  };

  // Show demo notice
  setTimeout(() => {
    addMessage('⚡ โหมดทดสอบ — กดปุ่มด้านล่างหรือพิมพ์ถามได้เลยค่ะ (ยังไม่ได้ต่อ backend)', 'bot');
  }, 500);
}
</script>
</body>
</html>
